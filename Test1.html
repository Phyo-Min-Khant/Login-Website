<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="box">
        <form>
            <h1>Login to your account</h3>
                <input class="username" type="text" name="Username" placeholder="Username"><br>
                <input class="email" type="email" name="Email" placeholder="Email"><br>
                <input class="password" type="password" name="Password" placeholder="Password"><br>
                <button class="login" type="button">Login In</button><br>
                <a class="forgot" href="">Forgot password?</a>
                <a href="https://mail.google.com/mail/u/0/#inbox">
                    <div class="link">
                        <i class="fa-brands fa-google"></i>
                        <p class="text">Continue with Gmail</p>
                    </div>
                </a>
                <a href="https://www.facebook.com/">
                    <div class="link">
                        <i class="fa-brands fa-facebook"></i>
                        <p class="text">Continue with Facebook</p>
                    </div>
                </a>
                <a href="https://www.tiktok.com/foryou">
                    <div class="link">
                        <i class="fa-brands fa-tiktok"></i>
                        <p class="text">Continue with Tiktok</p>
                    </div>
                </a>
                <div class="modecontainer">
                    <div class="mode">
                        <button class="mode1" type="button">
                            <a href="">Mode</a>
                        </button>
                        <button class="dark" type="button">
                            <a href="">Dark Mode</a>
                        </button>
                        <button class="light" type="button">
                            <a href="./Test3.html">Light Mode</a>
                        </button>
                    </div>
        </form>
    </div>
</body>

</html>
